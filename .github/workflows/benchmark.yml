name: Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI (CGO backend)
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go build -buildvcs=false -o zxing-cli ./cmd/zxing-cli

      - name: Build CLI (WASM backend)
        run: |
          CGO_ENABLED=0 go build -buildvcs=false -o zxing-cli-wasm ./cmd/zxing-cli

      - name: Run benchmark (CGO backend)
        id: cgo-bench
        run: |
          echo "=== CGO Backend Benchmark (5 iterations) ==="
          TOTAL=0
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            ./zxing-cli -i testdata/qrcode_test.png --try-harder
            END=$(date +%s%N)
            ITER_TIME=$(( (END - START) / 1000000 ))
            echo "  Iteration $i: ${ITER_TIME}ms"
            TOTAL=$((TOTAL + ITER_TIME))
          done
          CGO_TIME=$((TOTAL / 5))
          echo "CGO average decode time: ${CGO_TIME}ms"
          echo "cgo_time_ms=${CGO_TIME}" >> "$GITHUB_OUTPUT"

      - name: Run benchmark (WASM backend)
        id: wasm-bench
        run: |
          echo "=== WASM Backend Benchmark (5 iterations) ==="
          TOTAL=0
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            ./zxing-cli-wasm -i testdata/qrcode_test.png --try-harder --backend wasm
            END=$(date +%s%N)
            ITER_TIME=$(( (END - START) / 1000000 ))
            echo "  Iteration $i: ${ITER_TIME}ms"
            TOTAL=$((TOTAL + ITER_TIME))
          done
          WASM_TIME=$((TOTAL / 5))
          echo "WASM average decode time: ${WASM_TIME}ms"
          echo "wasm_time_ms=${WASM_TIME}" >> "$GITHUB_OUTPUT"

      - name: Generate benchmark report
        run: |
          mkdir -p benchmark_results
          cat > benchmark_results/benchmark_report.md << 'REPORT'
          # Benchmark Report
          REPORT
          echo "" >> benchmark_results/benchmark_report.md
          echo "Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> benchmark_results/benchmark_report.md
          echo "Platform: ubuntu-latest (average of 5 iterations)" >> benchmark_results/benchmark_report.md
          echo "" >> benchmark_results/benchmark_report.md
          echo "| Backend | Avg Decode Time (ms) |" >> benchmark_results/benchmark_report.md
          echo "|---------|-----------------|" >> benchmark_results/benchmark_report.md
          echo "| CGO     | ${{ steps.cgo-bench.outputs.cgo_time_ms }} |" >> benchmark_results/benchmark_report.md
          echo "| WASM    | ${{ steps.wasm-bench.outputs.wasm_time_ms }} |" >> benchmark_results/benchmark_report.md

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark_results/benchmark_report.md
          if-no-files-found: error
