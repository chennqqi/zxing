name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test with CGO backend (uses precompiled static libraries)
  cgo-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CGO
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go build -buildvcs=false ./...

      - name: Test CGO
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go test -buildvcs=false -v ./pkg/zxing/...

      - name: Vet
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go vet -buildvcs=false ./...

      - name: Build CLI
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go build -buildvcs=false -o zxing-cli ./cmd/zxing-cli

      - name: Test CLI
        run: |
          ./zxing-cli -i testdata/qrcode_test.png --try-harder

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zxing-cli-linux-x64
          path: zxing-cli
          if-no-files-found: error

  # Build and test with WASM backend (pure Go, no CGO)
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build non-CGO
        run: |
          CGO_ENABLED=0 go build -buildvcs=false ./...

      - name: Test WASM backend
        run: |
          CGO_ENABLED=0 go test -buildvcs=false -v ./pkg/wasm/...

      - name: Test build tools
        run: |
          CGO_ENABLED=0 go test -buildvcs=false -v ./cmd/build/...

      - name: Build CLI (WASM backend)
        run: |
          CGO_ENABLED=0 go build -buildvcs=false -o zxing-cli-wasm ./cmd/zxing-cli

      - name: Test CLI (WASM backend)
        run: |
          ./zxing-cli-wasm -i testdata/qrcode_test.png --try-harder --backend wasm

      - name: Build js/wasm target
        run: |
          GOOS=js GOARCH=wasm CGO_ENABLED=0 go build -buildvcs=false ./pkg/zxing/

  # Build static libraries from source (verify Docker build process)
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Linux x64 static libraries in Docker
        run: |
          docker build -t zxing-linux-build -f docker/Dockerfile.linux-build docker/
          docker run --rm -v "$PWD":/workspace:Z zxing-linux-build sh -c "
            /tmp/patch_using_enum.sh /workspace/zxing-cpp && \
            cd /tmp && rm -rf build && mkdir -p build && cd build && \
            cmake3 -G 'Unix Makefiles' \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_STATIC_LIB=ON \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_CXX_STANDARD=20 \
              -DCMAKE_CXX_FLAGS=-fcoroutines \
              /workspace && \
            make -j\$(nproc) && \
            cp lib/libZXing.a lib/libzxingwrapper.a /workspace/lib/linux-x64/
          "

      - name: Verify libraries
        run: |
          file lib/linux-x64/libZXing.a
          file lib/linux-x64/libzxingwrapper.a
          test -f lib/linux-x64/libZXing.a && echo "libZXing.a OK"
          test -f lib/linux-x64/libzxingwrapper.a && echo "libzxingwrapper.a OK"

      - name: Verify checksums match BUILDINFO
        run: |
          echo "=== Rebuilt library checksums ==="
          sha256sum lib/linux-x64/libZXing.a lib/linux-x64/libzxingwrapper.a
          echo "=== Expected checksums from BUILDINFO ==="
          grep 'SHA-256' lib/linux-x64/BUILDINFO
          echo "=== Note: checksums may differ if submodule was updated ==="
          echo "=== This step verifies reproducibility of the build ==="

  # Build CGO binary entirely inside CentOS 7 container for glibc 2.17 compatibility
  docker-cgo-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build CGO binary in CentOS 7 Docker (glibc 2.17 compatible)
        run: |
          docker build -t zxing-linux-build -f docker/Dockerfile.linux-build docker/
          docker run --rm -v "$PWD":/workspace:Z zxing-linux-build sh -c "
            /tmp/patch_using_enum.sh /workspace/zxing-cpp && \
            cd /tmp && rm -rf build && mkdir -p build && cd build && \
            cmake3 -G 'Unix Makefiles' \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_STATIC_LIB=ON \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_CXX_STANDARD=20 \
              -DCMAKE_CXX_FLAGS=-fcoroutines \
              /workspace 2>&1 | tail -3 && \
            make -j\$(nproc) 2>&1 | tail -3 && \
            cp lib/libZXing.a lib/libzxingwrapper.a /workspace/lib/linux-x64/ && \
            cd /workspace && \
            CGO_ENABLED=1 \
            CGO_CFLAGS='-I/workspace/include' \
            CGO_CXXFLAGS='-std=c++20 -I/workspace/include' \
            CGO_LDFLAGS='-L/workspace/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm' \
            go build -buildvcs=false -o /tmp/zxing-cli ./cmd/zxing-cli && \
            cp /tmp/zxing-cli /workspace/zxing-cli-glibc217 && \
            echo '=== GLIBC requirements ===' && \
            objdump -T /tmp/zxing-cli | grep -oP 'GLIBC_[\d.]+' | sort -V -u && \
            echo '=== Test binary ===' && \
            /tmp/zxing-cli -i /workspace/testdata/qrcode_test.png --try-harder
          "

      - name: Verify glibc compatibility
        run: |
          echo "=== GLIBC version requirements ==="
          objdump -T zxing-cli-glibc217 | grep -oP 'GLIBC_[\d.]+' | sort -V -u
          MAX_GLIBC=$(objdump -T zxing-cli-glibc217 | grep -oP 'GLIBC_[\d.]+' | sort -V | tail -1)
          echo "Highest GLIBC required: $MAX_GLIBC"
          if echo "$MAX_GLIBC" | grep -qP 'GLIBC_2\.(1[5-9]|[2-9])'; then
            echo "ERROR: Binary requires GLIBC > 2.14, not compatible with CentOS 7"
            exit 1
          fi
          echo "OK: Binary is compatible with glibc 2.14+"

      - name: Upload glibc 2.17 compatible binary
        uses: actions/upload-artifact@v4
        with:
          name: zxing-cli-linux-x64-glibc217
          path: zxing-cli-glibc217
          if-no-files-found: error

  # Build and test on Windows with CGO backend (uses precompiled MinGW .a libraries)
  windows-cgo-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW-w64 to PATH
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH

      - name: Verify MinGW GCC
        shell: bash
        run: |
          gcc --version
          which gcc

      - name: Build CGO
        shell: bash
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/windows-x64 -lzxingwrapper -lZXing -lstdc++" \
          go build -buildvcs=false ./...

      - name: Test CGO
        shell: bash
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/windows-x64 -lzxingwrapper -lZXing -lstdc++" \
          go test -buildvcs=false -v ./pkg/zxing/...

      - name: Build CLI
        shell: bash
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/windows-x64 -lzxingwrapper -lZXing -lstdc++" \
          go build -buildvcs=false -o zxing-cli.exe ./cmd/zxing-cli

      - name: Test CLI
        shell: bash
        run: |
          ./zxing-cli.exe -i testdata/qrcode_test.png --try-harder

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zxing-cli-windows-x64
          path: zxing-cli.exe
          if-no-files-found: error

  # Build and test on Windows with WASM backend (pure Go, no CGO)
  windows-wasm-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build non-CGO
        shell: bash
        run: |
          CGO_ENABLED=0 go build -buildvcs=false ./...

      - name: Test WASM backend
        shell: bash
        run: |
          CGO_ENABLED=0 go test -buildvcs=false -v ./pkg/wasm/...

      - name: Build CLI (WASM backend)
        shell: bash
        run: |
          CGO_ENABLED=0 go build -buildvcs=false -o zxing-cli-wasm.exe ./cmd/zxing-cli

      - name: Test CLI (WASM backend)
        shell: bash
        run: |
          ./zxing-cli-wasm.exe -i testdata/qrcode_test.png --try-harder --backend wasm
