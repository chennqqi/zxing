name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI (CGO backend)
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$(pwd)/include" \
          CGO_CXXFLAGS="-std=c++20 -I$(pwd)/include" \
          CGO_LDFLAGS="-L$(pwd)/lib/linux-x64 -lzxingwrapper -lZXing -lstdc++ -lm" \
          go build -buildvcs=false -o zxing-cli-linux-x64 ./cmd/zxing-cli

      - name: Build CLI (WASM backend)
        run: |
          CGO_ENABLED=0 go build -buildvcs=false -o zxing-cli-wasm ./cmd/zxing-cli

      - name: Test before release
        run: |
          ./zxing-cli-linux-x64 -i data/qrcode_www.bing.com.png --try-harder
          ./zxing-cli-wasm -i data/qrcode_www.bing.com.png --try-harder --backend wasm

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp zxing-cli-linux-x64 release-assets/
          cp zxing-cli-wasm release-assets/
          tar czf release-assets/libraries-linux-x64.tar.gz -C lib/linux-x64 .
          tar czf release-assets/libraries-windows-x64.tar.gz -C lib/windows-x64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
